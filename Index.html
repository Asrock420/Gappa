<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gappa Pro - WhatsApp Style</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0C-82DBnvvOIl5-gUe9g0yw2F8x3qIGQ",
            authDomain: "live-voice-translator-246d4.firebaseapp.com",
            projectId: "live-voice-translator-246d4",
            databaseURL: "https://live-voice-translator-246d4-default-rtdb.firebaseio.com",
            appId: "1:822824698662:web:291e2be193698c408af7e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const scriptURL = "https://script.google.com/macros/s/AKfycby3xsPasqW8DJb4RizR9PxwahkUHQmng3q80kdJmIRED2Eb_KbI_znrUkQg7tI_a-7m/exec";
        const notifySound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

        let currentUser = null;
        let selectedFriend = null;
        let timerInterval;
        let seconds = 0;

        // --- Auth & User List ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                set(ref(db, 'users/' + user.uid), { name: user.displayName || user.email, email: user.email });
                loadUsers();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        function loadUsers() {
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById('sidebar-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    if (child.val().email !== currentUser.email) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `<div class="avatar">${child.val().name[0]}</div> <span>${child.val().name}</span>`;
                        div.onclick = () => startPrivateChat(child.val());
                        list.appendChild(div);
                    }
                });
            });
        }

        function startPrivateChat(friend) {
            selectedFriend = friend;
            document.getElementById('chat-header-name').innerText = friend.name;
            document.getElementById('chat-placeholder').style.display = 'none';
            document.getElementById('active-chat').style.display = 'flex';
            const chatID = [currentUser.email.replace(/\./g, ''), friend.email.replace(/\./g, '')].sort().join('_');
            loadMessages(chatID);
        }

        function loadMessages(chatID) {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            onChildAdded(ref(db, 'chats/' + chatID), (snapshot) => {
                const data = snapshot.val();
                const isMe = data.sender === currentUser.email;
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
                msgDiv.innerHTML = `<strong>${data.translated}</strong><br><small>${data.original}</small>`;
                box.appendChild(msgDiv);
                box.scrollTop = box.scrollHeight;

                if (!isMe && data.timestamp > Date.now() - 3000) {
                    notifySound.play();
                    const utterance = new SpeechSynthesisUtterance(data.translated);
                    utterance.lang = data.targetLang;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        // --- Voice Logic ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();

        const micBtn = document.getElementById('micBtn');
        micBtn.onmousedown = () => {
            if (!selectedFriend) return;
            const myLang = document.getElementById('myLang').value;
            rec.lang = myLang === 'auto' ? '' : myLang;
            rec.start();
            micBtn.classList.add('recording');
            startTimer();
        };

        micBtn.onmouseup = () => {
            rec.stop();
            micBtn.classList.remove('recording');
            stopTimer();
        };

        rec.onresult = async (event) => {
            const original = event.results[0][0].transcript;
            const target = document.getElementById('friendLang').value;
            const response = await fetch(`${scriptURL}?text=${encodeURIComponent(original)}&target=${target}`);
            const translated = await response.text();

            const chatID = [currentUser.email.replace(/\./g, ''), selectedFriend.email.replace(/\./g, '')].sort().join('_');
            push(ref(db, 'chats/' + chatID), {
                sender: currentUser.email,
                original,
                translated,
                targetLang: target,
                timestamp: Date.now()
            });
        };

        function startTimer() {
            seconds = 0;
            document.getElementById('timer').style.display = 'inline';
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById('timer').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').style.display = 'none';
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; overflow: hidden; }
        
        #app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar Styles */
        #sidebar { width: 30%; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { background: #075e54; color: white; padding: 15px; font-weight: bold; }
        #sidebar-list { flex: 1; overflow-y: auto; }
        .user-card { padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.3s; }
        .user-card:hover { background: #f5f5f5; }
        .avatar { width: 40px; height: 40px; background: #128c7e; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Chat Area Styles */
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background: #e5ddd5; }
        #chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #777; font-style: italic; }
        #active-chat { display: none; flex-direction: column; height: 100%; }
        
        .chat-header { background: #075e54; color: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        
        .chat-footer { background: #f0f0f0; padding: 10px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #ddd; }
        .controls { display: flex; gap: 10px; width: 100%; margin-bottom: 8px; }
        select { flex: 1; padding: 5px; border-radius: 15px; border: 1px solid #ccc; }
        
        #micBtn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #128c7e; color: white; font-size: 22px; cursor: pointer; }
        #micBtn.recording { background: #f44336; transform: scale(1.1); }
        #timer { color: #f44336; font-weight: bold; margin-bottom: 5px; display: none; font-size: 18px; }

        @media (max-width: 600px) {
            #sidebar { width: 40%; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <button onclick="/* handleAuth call */">Login to Start</button>
    </div>

    <div id="app-container" style="display:none;">
        <div id="sidebar">
            <div class="sidebar-header">Gappa Chats</div>
            <div id="sidebar-list"></div>
        </div>

        <div id="chat-area">
            <div id="chat-placeholder">Select a friend to start translating...</div>
            
            <div id="active-chat">
                <div class="chat-header">
                    <span id="chat-header-name">Friend Name</span>
                    <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer;">Logout</button>
                </div>
                
                <div id="chat-box"></div>

                <div class="chat-footer">
                    <div id="timer">00:00</div>
                    <div class="controls">
                        <select id="myLang">
                            <option value="auto">Auto Detect</option>
                            <option value="bn-BD">My: Bengali</option>
                            <option value="en-US">My: English</option>
                        </select>
                        <select id="friendLang">
                            <option value="en">To: English</option>
                            <option value="bn">To: Bengali</option>
                        </select>
                    </div>
                    <button id="micBtn">🎤</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
