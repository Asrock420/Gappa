<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gappa - Professional Voice Translator</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0C-82DBnvvOIl5-gUe9g0yw2F8x3qIGQ",
            authDomain: "live-voice-translator-246d4.firebaseapp.com",
            projectId: "live-voice-translator-246d4",
            databaseURL: "https://live-voice-translator-246d4-default-rtdb.firebaseio.com",
            storageBucket: "live-voice-translator-246d4.firebasestorage.app",
            messagingSenderId: "822824698662",
            appId: "1:822824698662:web:291e2be193698c408af7e7",
            measurementId: "G-VDW394TXV9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const scriptURL = "https://script.google.com/macros/s/AKfycby3xsPasqW8DJb4RizR9PxwahkUHQmng3q80kdJmIRED2Eb_KbI_znrUkQg7tI_a-7m/exec";

        let currentUser = null;
        let tempTranslated = "";
        let tempOriginal = "";

        // UI Elements
        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const chatBox = document.getElementById('chat-box');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const status = document.getElementById('status');

        // --- Authentication Logic ---
        window.toggleAuth = () => {
            const nameField = document.getElementById('reg-name');
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const toggleText = document.getElementById('auth-toggle');
            
            if (nameField.style.display === 'none') {
                nameField.style.display = 'block';
                title.innerText = 'Create Account';
                btn.innerText = 'Register';
                toggleText.innerText = 'Already have an account? Login';
            } else {
                nameField.style.display = 'none';
                title.innerText = 'Login to Gappa';
                btn.innerText = 'Login';
                toggleText.innerText = 'New here? Create Account';
            }
        };

        window.handleAuth = async () => {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            const isRegister = document.getElementById('reg-name').style.display !== 'none';

            try {
                if (isRegister) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(userCredential.user, { displayName: name });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (error) { alert(error.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                document.getElementById('user-display-name').innerText = user.displayName || user.email;
            } else {
                authScreen.style.display = 'flex';
                chatScreen.style.display = 'none';
            }
        });

        window.logout = () => signOut(auth);

        // --- Voice & Chat Logic ---
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.interimResults = false;

        micBtn.onclick = () => {
            rec.lang = document.getElementById('myLang').value;
            rec.start();
            micBtn.classList.add('recording');
            status.innerText = "Listening...";
        };

        rec.onresult = async (event) => {
            micBtn.classList.remove('recording');
            tempOriginal = event.results[0][0].transcript;
            const targetLang = document.getElementById('friendLang').value;
            status.innerText = "Translating...";

            try {
                const response = await fetch(`${scriptURL}?text=${encodeURIComponent(tempOriginal)}&target=${targetLang}`);
                tempTranslated = await response.text();
                status.innerText = "Ready to send";
                sendBtn.style.display = "flex";
                document.getElementById('preview-text').innerText = tempTranslated;
            } catch (e) { status.innerText = "Error!"; }
        };

        sendBtn.onclick = () => {
            push(ref(db, 'gappa_chats'), {
                senderName: currentUser.displayName,
                senderEmail: currentUser.email,
                original: tempOriginal,
                translated: tempTranslated,
                lang: document.getElementById('friendLang').value,
                timestamp: Date.now()
            });
            sendBtn.style.display = "none";
            document.getElementById('preview-text').innerText = "";
            status.innerText = "Hold mic to speak";
        };

        onChildAdded(ref(db, 'gappa_chats'), (snapshot) => {
            const data = snapshot.val();
            displayMessage(data);
            if (data.timestamp > Date.now() - 2000 && data.senderEmail !== currentUser.email) {
                const utterance = new SpeechSynthesisUtterance(data.translated);
                utterance.lang = data.lang;
                window.speechSynthesis.speak(utterance);
            }
        });

        function displayMessage(data) {
            const isMe = data.senderEmail === currentUser.email;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="sender-name">${data.senderName || 'User'}</div>
                <div class="text">${data.translated}</div>
                <div class="sub">${data.original}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #075e54; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .auth-card button { width: 100%; padding: 12px; background: #128c7e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Main Chat Style */
        header { background: #075e54; color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid white; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 75%; position: relative; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .sent { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .sender-name { font-size: 11px; font-weight: bold; color: #075e54; margin-bottom: 3px; }
        .sub { font-size: 11px; color: #666; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 4px; padding-top: 2px; }

        .footer { background: #f0f0f0; padding: 15px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #ddd; }
        .controls-row { display: flex; width: 100%; gap: 10px; margin-bottom: 10px; }
        select { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid #ccc; font-size: 12px; }
        
        #preview-text { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 10px; min-height: 20px; }
        .btn-group { display: flex; align-items: center; gap: 20px; }
        
        #micBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #128c7e; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #micBtn.recording { background: #f44336; transform: scale(1.1); }
        #sendBtn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #075e54; color: white; font-size: 20px; cursor: pointer; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Login to Gappa</h2>
            <input type="text" id="reg-name" placeholder="Full Name" style="display:none;">
            <input type="email" id="reg-email" placeholder="Gmail Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button id="auth-btn" onclick="handleAuth()">Login</button>
            <p id="auth-toggle" onclick="toggleAuth()" style="font-size: 12px; color: #075e54; cursor: pointer; margin-top: 15px;">New here? Create Account</p>
        </div>
    </div>

    <div id="chat-screen" style="display:none; flex-direction: column; height: 100vh;">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://scontent.fdac189-1.fna.fbcdn.net/v/t39.30808-6/640941611_847544778310157_1414772726435608467_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=13d280&_nc_eui2=AeGlHol71l9tneklZ0_nBshEx_0LbWSX-RDH_QttZJf5EPEffP-l3k2sCdNcL048AwdNvDCisFAxQQ-gG7r6_s6E&_nc_ohc=4h_TYpLnHREQ7kNvwGKdUzB&_nc_oc=AdnN6k_oncXeKOQa9QESsMuE5evc6GS4r9Nltlz8sfekAqzf1fJT6DWgFfV66RFVOeQ&_nc_zt=23&_nc_ht=scontent.fdac189-1.fna&_nc_gid=H_JSqVpiTSBAfgBN6MF62A&oh=00_Afv0DTnp0-4PPxO6tnTovkJGxCEDTlgw8bl7Pb2A_tOcRg&oe=69A12266" class="profile-img">
                <div>
                    <div class="header-title">Gappa</div>
                    <div id="user-display-name" style="font-size: 10px; opacity: 0.8;"></div>
                </div>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer;">Logout</button>
        </header>

        <div id="chat-box"></div>

        <div class="footer">
            <div id="status" style="font-size: 12px; color: #666; margin-bottom: 5px;">Hold mic to speak</div>
            <div id="preview-text"></div>
            
            <div class="controls-row">
                <select id="myLang"><option value="bn-BD">My: Bengali</option><option value="en-US">My: English</option></select>
                <select id="friendLang"><option value="en">To: English</option><option value="bn">To: Bengali</option></select>
            </div>

            <div class="btn-group">
                <button id="micBtn">🎤</button>
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

</body>
</html>
