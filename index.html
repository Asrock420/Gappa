<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gappa Pro - Private AI Messenger</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0C-82DBnvvOIl5-gUe9g0yw2F8x3qIGQ",
            authDomain: "live-voice-translator-246d4.firebaseapp.com",
            projectId: "live-voice-translator-246d4",
            databaseURL: "https://live-voice-translator-246d4-default-rtdb.firebaseio.com",
            appId: "1:822824698662:web:291e2be193698c408af7e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const scriptURL = "https://script.google.com/macros/s/AKfycby3xsPasqW8DJb4RizR9PxwahkUHQmng3q80kdJmIRED2Eb_KbI_znrUkQg7tI_a-7m/exec";
        const notifySound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

        let currentUser = null;
        let selectedFriend = null;
        let timerInterval;
        let seconds = 0;

        // --- Authentication ---
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('name').value;
            const isReg = document.getElementById('name').style.display !== 'none';

            try {
                if (isReg) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        window.toggleReg = () => {
            const n = document.getElementById('name');
            n.style.display = n.style.display === 'none' ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = n.style.display === 'none' ? 'Login' : 'Register';
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                set(ref(db, 'users/' + user.uid), { name: user.displayName || user.email, email: user.email });
                loadUsers();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        // --- User List & Messaging ---
        function loadUsers() {
            onValue(ref(db, 'users'), (snapshot) => {
                const list = document.getElementById('sidebar-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    if (child.val().email !== currentUser.email) {
                        const div = document.createElement('div');
                        div.className = 'user-card';
                        div.innerHTML = `<div class="avatar">${child.val().name[0].toUpperCase()}</div> <span>${child.val().name}</span>`;
                        div.onclick = () => startChat(child.val());
                        list.appendChild(div);
                    }
                });
            });
        }

        function startChat(friend) {
            selectedFriend = friend;
            document.getElementById('chat-header-name').innerText = friend.name;
            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('chat-main').style.display = 'flex';
            const chatID = [currentUser.email.replace(/\./g, ''), friend.email.replace(/\./g, '')].sort().join('_');
            
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            onChildAdded(ref(db, 'chats/' + chatID), (snap) => {
                const d = snap.val();
                const isMe = d.sender === currentUser.email;
                const m = document.createElement('div');
                m.className = `msg ${isMe ? 'sent' : 'received'}`;
                m.innerHTML = `<strong>${d.translated}</strong><br><small>${d.original}</small>`;
                box.appendChild(m);
                box.scrollTop = box.scrollHeight;

                if (!isMe && d.timestamp > Date.now() - 3000) {
                    notifySound.play();
                    const ut = new SpeechSynthesisUtterance(d.translated);
                    ut.lang = d.targetLang;
                    window.speechSynthesis.speak(ut);
                }
            });
        }

        // --- Voice Logic ---
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Rec();

        const mBtn = document.getElementById('micBtn');
        mBtn.onmousedown = () => {
            if (!selectedFriend) return;
            const l = document.getElementById('myLang').value;
            rec.lang = l === 'auto' ? '' : l;
            rec.start();
            mBtn.classList.add('recording');
            startTimer();
        };
        mBtn.onmouseup = () => { rec.stop(); mBtn.classList.remove('recording'); stopTimer(); };
        
        // Mobile Support
        mBtn.ontouchstart = (e) => { e.preventDefault(); mBtn.onmousedown(); };
        mBtn.ontouchend = () => mBtn.onmouseup();

        rec.onresult = async (e) => {
            const ori = e.results[0][0].transcript;
            const tar = document.getElementById('friendLang').value;
            const res = await fetch(`${scriptURL}?text=${encodeURIComponent(ori)}&target=${tar}`);
            const tra = await res.text();
            const chatID = [currentUser.email.replace(/\./g, ''), selectedFriend.email.replace(/\./g, '')].sort().join('_');
            push(ref(db, 'chats/' + chatID), { sender: currentUser.email, original: ori, translated: tra, targetLang: tar, timestamp: Date.now() });
        };

        function startTimer() {
            seconds = 0; document.getElementById('timer').style.display = 'block';
            timerInterval = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById('timer').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            }, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); document.getElementById('timer').style.display = 'none'; }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; background: #e5ddd5; overflow: hidden; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #075e54; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: white; padding: 30px; border-radius: 10px; width: 320px; text-align: center; }
        .auth-card input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .auth-card button { width: 100%; padding: 10px; background: #128c7e; color: white; border: none; cursor: pointer; margin-top: 10px; border-radius: 5px; }

        /* App Layout */
        #app-container { display: none; height: 100vh; }
        #sidebar { width: 30%; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .side-head { background: #075e54; color: white; padding: 15px; font-weight: bold; }
        #sidebar-list { flex: 1; overflow-y: auto; }
        .user-card { padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .user-card:hover { background: #f9f9f9; }
        .avatar { width: 35px; height: 35px; background: #128c7e; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; }
        #chat-main { display: none; flex-direction: column; height: 100%; }
        .chat-head { background: #075e54; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { padding: 8px 12px; border-radius: 7px; max-width: 75%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }

        .chat-foot { background: #f0f0f0; padding: 15px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid #ddd; }
        #timer { color: #f44336; font-weight: bold; margin-bottom: 5px; display: none; }
        .controls { display: flex; gap: 10px; width: 100%; margin-bottom: 10px; }
        select { flex: 1; padding: 5px; border-radius: 20px; border: 1px solid #ccc; font-size: 12px; }
        #micBtn { width: 60px; height: 60px; border-radius: 50%; background: #128c7e; color: white; border: none; font-size: 24px; cursor: pointer; }
        #micBtn.recording { background: #f44336; transform: scale(1.1); }

        @media (max-width: 600px) { #sidebar { width: 100px; } .avatar { margin: 0 auto; } .user-card span { display: none; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Gappa Pro</h2>
            <input type="text" id="name" placeholder="Full Name" style="display:none;">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="auth-btn" onclick="handleAuth()">Login</button>
            <p onclick="toggleReg()" style="font-size: 12px; color: #075e54; cursor: pointer; margin-top: 10px;">Create Account / Login</p>
        </div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="side-head">Chats</div>
            <div id="sidebar-list"></div>
        </div>
        <div id="chat-area">
            <div id="placeholder">Select a friend to start Gappa</div>
            <div id="chat-main">
                <div class="chat-head">
                    <span id="chat-header-name">Friend Name</span>
                    <button onclick="signOut(getAuth())" style="background:none; border:none; color:white; cursor:pointer;">Logout</button>
                </div>
                <div id="chat-box"></div>
                <div class="chat-foot">
                    <div id="timer">00:00</div>
                    <div class="controls">
                        <select id="myLang">
                            <option value="auto">Auto Detect</option>
                            <option value="bn-BD">Bengali</option>
                            <option value="en-US">English</option>
                        </select>
                        <select id="friendLang">
                            <option value="en">Translate to: English</option>
                            <option value="bn">Translate to: Bengali</option>
                        </select>
                    </div>
                    <button id="micBtn">🎤</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
